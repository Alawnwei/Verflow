server:
  port: 8080

spring:
  application:
    name: veriflow
  
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_test_platform
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT配置
jwt:
  secret: ${JWT_SECRET:veriflow-secret-key-2024}
  expiration: 86400000

# LLM配置
llm:
  primary-model: deepseek-v4-flash
  api-keys:
    deepseek: ${DEEPSEEK_API_KEY:}
    openai: ${OPENAI_API_KEY:}
    anthropic: ${ANTHROPIC_API_KEY:}
  timeout: 60
  max-tokens: 8192

# Lark配置
lark:
  webhook-url: ${LARK_WEBHOOK_URL:}

# 日志配置
logging:
  level:
    com.example.veriflow: DEBUG
    org.springframework.security: INFO

# 跨域配置
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080
