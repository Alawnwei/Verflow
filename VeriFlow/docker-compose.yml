version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: veriflow-postgres
    environment:
      POSTGRES_DB: ai_test_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veriflow-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_test_platform
      DB_USERNAME: postgres
      DB_PASSWORD: password
      JWT_SECRET: veriflow-secret-key-2024
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veriflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
